<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GetAIBD Page Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Drag handle -->
    <div id="drag-handle" class="drag-handle">
      <span class="drag-dots">⋮⋮</span>
      <span class="drag-title">GetAIBD Assistant</span>
      <button id="clear-btn" class="icon-btn" title="Clear conversation">🗑</button>
      <button id="copy-btn" class="icon-btn" title="Copy conversation">📋</button>
      <button id="settings-btn" class="icon-btn" title="Open settings">⚙</button>
    </div>

    <!-- Setup gate (no API key) -->
    <div id="needsSetup" class="setup hidden">
      <div class="setup-content">
        <p>Add your GetAIBD API key to get started.</p>
        <button id="openOptions">Open settings</button>
      </div>
    </div>

    <!-- Conversation thread -->
    <main id="main">
      <div id="conversation" class="conversation">
        <!-- Welcome message (only shown when no history) -->
        <div id="welcome-msg" class="message assistant welcome">
          <div class="message-content">
            Hello! I can answer questions about the page you're viewing. Ask me anything!
          </div>
        </div>
        <!-- Messages are rendered here dynamically -->
      </div>
      <div id="status" class="status"></div>
      <div class="input-area">
        <textarea
          id="chat-input"
          rows="1"
          placeholder="Ask about this page…"
        ></textarea>
        <button id="send-btn" class="send-btn" title="Send (Enter)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
